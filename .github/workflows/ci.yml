name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run python scripts/compile_sigma_rules.py --source tests/fixtures/saf_sigma --validate-min 6
      - run: uv run python scripts/compile_sigma_rules.py --check
      - run: uv run pytest
      - run: |
          uv run python - <<'PY'
          from mcts.testing.saf_parity import PARITY_THRESHOLD, PARITY_TECHNIQUES, evaluate_technique

          failures = []
          for technique_id in PARITY_TECHNIQUES:
              result = evaluate_technique(technique_id)
              if result.parity_pct < PARITY_THRESHOLD:
                  failures.append(
                      f"{technique_id}: {result.parity_pct}% "
                      f"(FP={result.false_positives}, FN={result.false_negatives})"
                  )
          if failures:
              raise SystemExit("SAF-MCP parity below threshold:\n" + "\n".join(failures))
          print(f"SAF-MCP parity gate passed for {len(PARITY_TECHNIQUES)} techniques (>={PARITY_THRESHOLD}%)")
          PY
      - run: |
          uv run mcts scan examples/vulnerable-mcp-server/server.py --no-progress --format sarif -o mcts-ci.sarif
          uv run python -c "import json; p=json.load(open('mcts-ci.sarif')); assert p.get('version') and p.get('runs'), 'invalid SARIF'"
      - run: uv run python -c "from pathlib import Path; from mcts.testing.saf_parity import write_parity_report; write_parity_report(Path('parity-report.json'))"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: saf-mcp-parity-report
          path: parity-report.json
